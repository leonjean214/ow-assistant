<!doctype html>
<!--
  W0 spike：游戏内浮层窗口。用 iframe 复用现有 SPA 的 overlay 模式(?overlay=1)，
  并把 background.js 转发来的 GEP 消息(owgep)中继进 iframe。
  ⚠️ 未在 Win 实测。SPA_URL 需指向可访问的 SPA(本地 http.server 或部署地址)；
     打包进 Overwolf 时也可改为把整个 SPA 拷进本目录、iframe 指向相对路径。见 SPIKE.md。
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>OW 助手 Overlay</title>
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; background: transparent; }
  </style>
</head>
<body>
  <iframe id="spa" title="OW 助手浮层"></iframe>
  <script>
    // 部署后改为你的 SPA 地址；本地联调可用 http://localhost:8000/?overlay=1
    const SPA_URL = "http://localhost:8000/?overlay=1";
    const frame = document.getElementById("spa");
    frame.src = SPA_URL;

    // 接收 background.js 的【原始 GEP】消息，翻译成 SPA 约定的【干净 schema】再中继给 iframe。
    // SPA(app.js handleOverlayMessage) 已实现并可测：
    //   { source:"owgep", kind:"my-hero", heroId }      → 设为克制「我当前英雄」
    //   { source:"owgep", kind:"enemies", heroIds:[...] } → 灌入克制/overlay 敌方
    // ⚠️ 下面 translate() 的字段路径是占位，待 W0 在 Win 看到真实 info/events 结构后回填。
    function translate(raw) {
      const msgs = [];
      if (!raw) return msgs;
      // 例(待核对)：raw.payload.info.match_info.hero_name → 本方英雄名 → 经 SPA findHeroId 匹配
      const heroName = raw?.payload?.info?.hero?.name || raw?.payload?.info?.me?.hero;
      if (heroName) msgs.push({ source: "owgep", kind: "my-hero", heroId: heroName });
      return msgs;
    }
    window.addEventListener("message", (ev) => {
      const d = ev.data;
      if (!d || d.source !== "owgep") return;
      // 已是干净 schema(带 kind)直接转发；否则尝试翻译原始 GEP。
      const toSend = d.kind ? [d] : translate(d);
      for (const m of toSend) {
        try { frame.contentWindow.postMessage(m, "*"); } catch (e) { /* iframe 跨域时降级 */ }
      }
    });
  </script>
</body>
</html>
